<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
    <div class="preview-container">
        <div class="box one">
           <picture> <source media="(max-width: 600px)" srcset="/image-product-mobile.jpg"> <img class="card-image" src="/image-product-desktop.jpg" alt="Perfum"></picture>
        </div>
        <div class="box two">

                <span class="current-price">$149.99</span>
                <del class="old-price">$169.99</del>
            </p>
            <a class="button" href="#"><img src="icon-cart.svg" alt=""> Add to Cart</a>
